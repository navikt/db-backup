name: PR checks
on:
  pull_request:
    branches:
      - main

jobs:
  test_and_lint:
    name: Test and lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - uses: jdx/mise-action@9bf94b1c0d0f7b3f6a6d2f8e0c8f0f7f5c2f4c33 # jdx/mise-action@v4

      - name: Run tests
        run: mise run test

      - name: Run golangci-lint
        run: mise run lint

      - name: Verify build
        run: mise run build
